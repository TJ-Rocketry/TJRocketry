services:
  db:
    image: postgres:15-alpine
    container_name: tjrocketry-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tjrocketry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tjrocketry-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/tjrocketry?schema=public
      - ION_CLIENT_ID=${ION_CLIENT_ID}
      - ION_CLIENT_SECRET=${ION_CLIENT_SECRET}
      - ION_REDIRECT_URI=${ION_REDIRECT_URI}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - db

volumes:
  postgres_data:
